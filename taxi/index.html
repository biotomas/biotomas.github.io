<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Taxi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container"></div>
    <div id="ui-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; background: rgba(0,0,0,0.5); color: white; font-family: monospace; text-align: center;">
        <h1 style="margin-bottom: 5px; font-size: 36px; letter-spacing: 2px;">SUNSET TAXI</h1>
        <div id="high-score-display" style="margin-bottom: 15px; font-size: 18px; color: #FFD700; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);">Top Score: 0</div>
        
        <p id="instructions-text" style="margin-bottom: 25px; max-width: 450px; font-size: 16px; line-height: 1.6; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 8px;">
            Avoid the cars as long as you can!<br><br>
            <strong>CONTROLS:</strong><br>
            Left / Right keys to steer<br>
            Space to jump<br>
            Down Arrow to pause
        </p>
        
        <div id="game-over-message" style="margin-bottom: 25px; max-width: 450px; font-size: 18px; line-height: 1.6; padding: 0 20px; text-align: center;"></div>
        
        <button id="startBtn" style="padding: 15px 40px; font-size: 22px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; background: #FF4500; color: white;">Start Game</button>
        <button id="restartBtn" style="padding: 15px 40px; font-size: 22px; cursor: pointer; display: none; border-radius: 4px; border: none; font-weight: bold; background: #FF4500; color: white;">Restart Game</button>
    </div>
    <div id="pause-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 15; background: rgba(0,0,0,0.75); color: white; font-family: monospace; text-align: center;">
        <h2 style="font-size: 36px; letter-spacing: 2px; margin-bottom: 10px;">GAME PAUSED</h2>
        <p style="font-size: 18px; color: #aaa;">Hit Up Arrow to unpause</p>
    </div>
    <div id="score" style="position: absolute; top: 10px; right: 10px; color: white; font-family: monospace; font-size: 16px;">Score: 0</div>
    <button id="muteBtn" style="position: absolute; top: 40px; right: 10px; z-index: 10; cursor: pointer;">Mute Music</button>
    <div id="fps" style="position: absolute; top: 10px; left: 10px; color: white; font-family: monospace; font-size: 16px;">FPS: 0</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js?v=2"></script>
</body>
</html>
