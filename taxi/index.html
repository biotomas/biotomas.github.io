<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Taxi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container"></div>
    <div id="ui-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 20; background: rgba(0,0,0,0.5);">
        <button id="startBtn" style="padding: 20px 40px; font-size: 24px; cursor: pointer;">Start Game</button>
        <button id="restartBtn" style="padding: 20px 40px; font-size: 24px; cursor: pointer; display: none;">Restart Game</button>
    </div>
    <div id="score" style="position: absolute; top: 10px; right: 10px; color: white; font-family: monospace; font-size: 16px;">Score: 0</div>
    <button id="muteBtn" style="position: absolute; top: 40px; right: 10px; z-index: 10; cursor: pointer;">Mute Music</button>
    <div id="fps" style="position: absolute; top: 10px; left: 10px; color: white; font-family: monospace; font-size: 16px;">FPS: 0</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js?v=2"></script>
</body>
</html>
